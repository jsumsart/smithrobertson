<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smith Robertson Museum Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Libre+Baskerville:wght@400;700&family=Manrope:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="catalog-page archive-page" data-public-page="archive">
    <div class="catalog-shell">
      <header class="catalog-site-header">
        <a id="catalogBrand" class="catalog-site-header__brand" href="./catalog.html">Smith Robertson Collections</a>
        <nav class="catalog-site-header__nav">
          <a class="button button--ghost" href="./catalog.html">Digital Gallery</a>
          <a class="button button--primary" href="./archive.html" aria-current="page">Archive</a>
          <a id="catalogAuthAction" class="button button--ghost" href="./index.html#authPanel">Log In</a>
        </nav>
      </header>

      <main class="public-site">
        <section class="archive-hero">
          <div class="archive-hero__copy">
            <p class="eyebrow">Public Archive</p>
            <h1 id="catalogTitle">Browse published Smith Robertson records.</h1>
            <p id="catalogIntro" class="hero__lede">
              This view is for visitors, partners, and researchers. Only records marked for public display are shown here.
            </p>
          </div>
          <div class="archive-metric">
            <span class="metric__label">Published Records</span>
            <strong id="catalogTotal">0 public records</strong>
          </div>
        </section>

        <section class="archive-toolbar" aria-label="Public archive filters">
          <label class="field">
            <span>Search</span>
            <input id="catalogSearch" type="search" placeholder="Search titles, themes, key locations, tags..." />
          </label>
          <label class="field">
            <span>Theme</span>
            <select id="catalogTheme"></select>
          </label>
          <label class="field">
            <span>Record Type</span>
            <select id="catalogType"></select>
          </label>
        </section>

        <p id="catalogStatus" class="help-text"></p>
        <section id="catalogList" class="archive-list" aria-live="polite"></section>
      </main>
    </div>

    <template id="archiveRowTemplate">
      <article class="archive-row">
        <div class="archive-row__media">
          <img class="archive-row__image" alt="" hidden />
        </div>
        <div class="archive-row__body">
          <div class="archive-row__top">
            <p class="archive-row__meta"></p>
            <div class="archive-row__badges"></div>
          </div>
          <h3></h3>
          <p class="archive-row__description"></p>
          <div class="tag-list"></div>
        </div>
      </article>
    </template>

    <script src="./supabase-config.js"></script>
    <script type="module" src="./catalog.js"></script>
  </body>
</html>
